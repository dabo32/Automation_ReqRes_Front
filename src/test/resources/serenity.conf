webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "start-maximized",
        "incognito",
        "--disable-gpu",
        "--disable-dev-shm-usage"
      ]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com/"
  }
  all {
    pages {
      saucedemo = "https://www.saucedemo.com/"
    }
  }
}

serenity {
  take.screenshots = FOR_EACH_ACTION
  report.accessibility = true
  project.name = "Automation SauceDemo - Challenge"

  outputDirectory = "target/site/serenity"
  test.root = "com.saucedemo.automation"

  verbose.steps = true
  logging = VERBOSE
}