webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "start-maximized", "incognito"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com/"
  }
}

#Configuration Screenshots
serenity {
  take.screenshots = FOR_EACH_ACTION
  report.accessibility = true
}